<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(${pageTitle})}"></head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container page-wrapper">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h3 mb-4" th:text="${pageTitle}">Form evento</h1>

                        <form th:action="@{${formAction}}" th:object="${event}" method="post">

                            <div class="mb-3">
                                <label for="title" class="form-label">Titolo</label>
                                <input id="title" type="text" class="form-control" th:field="*{title}">
                                <div class="text-danger small" th:if="${#fields.hasErrors('title')}"
                                    th:errors="*{title}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Descrizione</label>
                                <textarea id="description" class="form-control" rows="5"
                                    th:field="*{description}"></textarea>
                                <div class="text-danger small" th:if="${#fields.hasErrors('description')}"
                                    th:errors="*{description}"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="city" class="form-label">Città</label>
                                    <input id="city" type="text" class="form-control" th:field="*{city}">
                                    <div class="text-danger small" th:if="${#fields.hasErrors('city')}"
                                        th:errors="*{city}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="address" class="form-label">Indirizzo</label>
                                    <input id="address" type="text" class="form-control" th:field="*{address}">
                                    <div class="text-danger small" th:if="${#fields.hasErrors('address')}"
                                        th:errors="*{address}"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="startAt" class="form-label">Data/Ora inizio</label>
                                    <input id="startAt" type="datetime-local" class="form-control"
                                        th:field="*{startAt}">
                                    <div class="text-danger small" th:if="${#fields.hasErrors('startAt')}"
                                        th:errors="*{startAt}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="endAt" class="form-label">Data/Ora fine</label>
                                    <input id="endAt" type="datetime-local" class="form-control" th:field="*{endAt}">
                                    <div class="text-danger small" th:if="${#fields.hasErrors('endAt')}"
                                        th:errors="*{endAt}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="categories" class="form-label">Categorie</label>
                                <select id="categories" class="form-select" th:field="*{categories}" multiple size="6">
                                    <option th:each="category : ${allCategories}" th:value="${category.id}"
                                        th:text="${category.name}">
                                    </option>
                                </select>
                                <div class="form-text">Tieni premuto CTRL o CMD per selezionare più categorie.</div>
                                <div class="text-danger small" th:if="${#fields.hasErrors('categories')}"
                                    th:errors="*{categories}"></div>
                            </div>


                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Salva</button>
                                <a th:href="@{/organizer/events}" class="btn btn-outline-secondary">Annulla</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
