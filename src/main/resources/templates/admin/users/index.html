<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Gestione utenti')}"></head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container page-wrapper">
        <h1 class="mb-4">Gestione utenti</h1>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Enabled</th>
                                <th>Ruoli</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.username}"></td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge text-bg-success">Attivo</span>
                                    <span th:unless="${user.enabled}" class="badge text-bg-danger">Disattivo</span>
                                </td>
                                <td>
                                    <span th:each="role, stat : ${user.roles}">
                                        <span class="badge text-bg-secondary" th:text="${role.name}"></span>
                                        <span th:if="${!stat.last}"></span>
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
